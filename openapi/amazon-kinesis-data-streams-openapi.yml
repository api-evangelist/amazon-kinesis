  schemas:
    StreamName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: '[a-zA-Z0-9_.-]+'
      description: The name of the Kinesis data stream.
    StreamARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: 'arn:aws.*:kinesis:.*:\d{12}:stream/\S+'
      description: The ARN of the Kinesis data stream.
    ShardId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: '[a-zA-Z0-9_.-]+'
      description: The unique identifier of the shard within the stream.
    SequenceNumber:
      type: string
      pattern: '0|([1-9]\d{0,128})'
      description: >-
        The sequence number assigned to a data record. Sequence numbers increase
        over time within a shard.
    PartitionKey:
      type: string
      minLength: 1
      maxLength: 256
      description: >-
        Determines which shard in the stream the data record is assigned to.
        Unicode string with a maximum length of 256 characters.
    ConsumerARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: '^(arn):aws.*:kinesis:.*:\d{12}:.*stream\/[a-zA-Z0-9_.-]+\/consumer\/[a-zA-Z0-9_.-]+:[0-9]+'
      description: The ARN of the registered stream consumer.
    EncryptionType:
      type: string
      enum:
        - NONE
        - KMS
      description: The encryption type used on the record or stream.
    StreamMode:
      type: string
      enum:
        - PROVISIONED
        - ON_DEMAND
      description: >-
        Specifies the capacity mode to which you want to set your data stream.
        PROVISIONED requires you to set ShardCount; ON_DEMAND automatically
        manages the number of shards.
    StreamStatus:
      type: string
      enum:
        - CREATING
        - DELETING
        - ACTIVE
        - UPDATING
      description: The current status of the data stream.
    ConsumerStatus:
      type: string
      enum:
        - CREATING
        - DELETING
        - ACTIVE
      description: The current status of the registered stream consumer.
    ShardIteratorType:
      type: string
      enum:
        - AT_SEQUENCE_NUMBER
        - AFTER_SEQUENCE_NUMBER
        - TRIM_HORIZON
        - LATEST
        - AT_TIMESTAMP
      description: >-
        Determines how the shard iterator is used to start reading data
        records from the shard.
    ScalingType:
      type: string
      enum:
        - UNIFORM_SCALING
      description: The scaling type for the UpdateShardCount operation.
    MetricsName:
      type: string
      enum:
        - IncomingBytes
        - IncomingRecords
        - OutgoingBytes
        - OutgoingRecords
        - WriteProvisionedThroughputExceeded
        - ReadProvisionedThroughputExceeded
        - IteratorAgeMilliseconds
        - ALL
      description: The name of the shard-level metric.
    HashKeyRange:
      type: object
      description: The range of possible hash key values for the shard.
      required:
        - StartingHashKey
        - EndingHashKey
      properties:
        StartingHashKey:
          type: string
          description: The starting hash key of the hash key range.
        EndingHashKey:
          type: string
          description: The ending hash key of the hash key range.
    SequenceNumberRange:
      type: object
      description: The range of possible sequence numbers for the shard.
      required:
        - StartingSequenceNumber
      properties:
        StartingSequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        EndingSequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
    Shard:
      type: object
      description: A uniquely identified group of data records in a Kinesis data stream.
      required:
        - ShardId
        - HashKeyRange
        - SequenceNumberRange
      properties:
        ShardId:
          $ref: '#/components/schemas/ShardId'
        ParentShardId:
          $ref: '#/components/schemas/ShardId'
        AdjacentParentShardId:
          $ref: '#/components/schemas/ShardId'
        HashKeyRange:
          $ref: '#/components/schemas/HashKeyRange'
        SequenceNumberRange:
          $ref: '#/components/schemas/SequenceNumberRange'
    ChildShard:
      type: object
      description: A child shard resulting from a shard split or merge.
      required:
        - ShardId
        - ParentShards
        - HashKeyRange
      properties:
        ShardId:
          $ref: '#/components/schemas/ShardId'
        ParentShards:
          type: array
          items:
            $ref: '#/components/schemas/ShardId'
          description: The list of parent shard IDs.
        HashKeyRange:
          $ref: '#/components/schemas/HashKeyRange'
    Record:
      type: object
      description: The unit of data of the Kinesis data stream.
      required:
        - SequenceNumber
        - Data
        - PartitionKey
      properties:
        SequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        ApproximateArrivalTimestamp:
          type: number
          format: double
          description: >-
            The approximate time that the record was inserted into the stream.
        Data:
          type: string
          format: byte
          minLength: 0
          maxLength: 1048576
          description: >-
            The data blob. The data in the blob is both opaque and immutable to
            Kinesis Data Streams, which does not inspect, interpret, or change
            the data in the blob in any way. Base64-encoded when serialized.
        PartitionKey:
          $ref: '#/components/schemas/PartitionKey'
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
    StreamModeDetails:
      type: object
      description: The capacity mode details for the data stream.
      required:
        - StreamMode
      properties:
        StreamMode:
          $ref: '#/components/schemas/StreamMode'
    StreamDescription:
      type: object
      description: Detailed information about a Kinesis data stream.
      required:
        - StreamName
        - StreamARN
        - StreamStatus
        - Shards
        - HasMoreShards
        - RetentionPeriodHours
        - StreamCreationTimestamp
        - EnhancedMonitoring
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        StreamStatus:
          $ref: '#/components/schemas/StreamStatus'
        StreamModeDetails:
          $ref: '#/components/schemas/StreamModeDetails'
        Shards:
          type: array
          items:
            $ref: '#/components/schemas/Shard'
          description: The shards that comprise the stream.
        HasMoreShards:
          type: boolean
          description: >-
            If true, there are more shards in the stream available to describe.
        RetentionPeriodHours:
          type: integer
          minimum: 24
          maximum: 8760
          description: The current retention period, in hours.
        StreamCreationTimestamp:
          type: number
          format: double
          description: The approximate time that the stream was created.
        EnhancedMonitoring:
          type: array
          items:
            $ref: '#/components/schemas/EnhancedMetrics'
          description: Enhanced shard-level metric settings.
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
        KeyId:
          type: string
          description: The GUID for the customer-managed AWS KMS key.
    StreamDescriptionSummary:
      type: object
      description: Summary information about a Kinesis data stream.
      required:
        - StreamName
        - StreamARN
        - StreamStatus
        - RetentionPeriodHours
        - StreamCreationTimestamp
        - EnhancedMonitoring
        - OpenShardCount
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        StreamStatus:
          $ref: '#/components/schemas/StreamStatus'
        StreamModeDetails:
          $ref: '#/components/schemas/StreamModeDetails'
        RetentionPeriodHours:
          type: integer
          minimum: 24
          maximum: 8760
        StreamCreationTimestamp:
          type: number
          format: double
        EnhancedMonitoring:
          type: array
          items:
            $ref: '#/components/schemas/EnhancedMetrics'
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
        KeyId:
          type: string
        OpenShardCount:
          type: integer
          minimum: 0
          description: The number of open shards in the stream.
        ConsumerCount:
          type: integer
          minimum: 0
          description: >-
            The number of enhanced fan-out consumers registered with the stream.
    EnhancedMetrics:
      type: object
      description: Enhanced shard-level metric details.
      properties:
        ShardLevelMetrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricsName'
          description: List of shard-level metrics currently enabled.
    Consumer:
      type: object
      description: An object that represents the details of the consumer you registered.
      required:
        - ConsumerName
        - ConsumerARN
        - ConsumerStatus
        - ConsumerCreationTimestamp
      properties:
        ConsumerName:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '[a-zA-Z0-9_.-]+'
          description: The name of the consumer.
        ConsumerARN:
          $ref: '#/components/schemas/ConsumerARN'
        ConsumerStatus:
          $ref: '#/components/schemas/ConsumerStatus'
        ConsumerCreationTimestamp:
          type: number
          format: double
          description: Timestamp when the consumer was created.
    ConsumerDescription:
      type: object
      description: Full description of a registered stream consumer.
      required:
        - ConsumerName
        - ConsumerARN
        - ConsumerStatus
        - ConsumerCreationTimestamp
        - StreamARN
      properties:
        ConsumerName:
          type: string
          minLength: 1
          maxLength: 128
        ConsumerARN:
          $ref: '#/components/schemas/ConsumerARN'
        ConsumerStatus:
          $ref: '#/components/schemas/ConsumerStatus'
        ConsumerCreationTimestamp:
          type: number
          format: double
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
    Tag:
      type: object
      description: Metadata assigned to the stream or resource.
      required:
        - Key
      properties:
        Key:
          type: string
          minLength: 1
          maxLength: 128
          description: A unique identifier for the tag.
        Value:
          type: string
          minLength: 0
          maxLength: 256
          description: An optional string value for the tag.
    StartingPosition:
      type: object
      description: The starting position in the data stream from which to start streaming.
      required:
        - Type
      properties:
        Type:
          $ref: '#/components/schemas/ShardIteratorType'
        SequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        Timestamp:
          type: number
          format: double
          description: >-
            The timestamp of the data record from which to start reading. Used
            with shard iterator type AT_TIMESTAMP.
    SubscribeToShardEvent:
      type: object
      description: >-
        An event pushed over the HTTP/2 connection to the consumer. Contains the
        data records from the shard along with metadata.
      required:
        - Records
        - ContinuationSequenceNumber
        - MillisBehindLatest
      properties:
        Records:
          type: array
          items:
            $ref: '#/components/schemas/Record'
          description: The data records from the shard.
        ContinuationSequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        MillisBehindLatest:
          type: integer
          minimum: 0
          description: >-
            The number of milliseconds the read records are from the tip of the
            stream, indicating how far behind current time the consumer is.
        ChildShards:
          type: array
          items:
            $ref: '#/components/schemas/ChildShard'
          description: >-
            The list of the child shards of the current shard, returned only at
            the end of the current shard.
    PutRecordRequestEntry:
      type: object
      description: >-
        Represents a record entry for a PutRecords request.
      required:
        - Data
        - PartitionKey
      properties:
        Data:
          type: string
          format: byte
          minLength: 0
          maxLength: 1048576
          description: The data blob to put into the record.
        ExplicitHashKey:
          type: string
          pattern: '0|([1-9]\d{0,38})'
          description: The hash value used to explicitly determine the shard.
        PartitionKey:
          $ref: '#/components/schemas/PartitionKey'
    PutRecordsResultEntry:
      type: object
      description: >-
        Represents the result of an individual record in a PutRecords response.
      properties:
        SequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        ShardId:
          $ref: '#/components/schemas/ShardId'
        ErrorCode:
          type: string
          description: The error code for an individual record result.
        ErrorMessage:
          type: string
          description: The error message for an individual record result.
    CreateStreamInput:
      type: object
      required:
        - StreamName
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        ShardCount:
          type: integer
          minimum: 1
          description: >-
            The number of shards that the stream will use. Required for
            PROVISIONED mode.
        StreamModeDetails:
          $ref: '#/components/schemas/StreamModeDetails'
        Tags:
          type: object
          additionalProperties:
            type: string
            maxLength: 256
          description: A set of up to 50 key-value pairs for tagging the stream.
    DeleteStreamInput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        EnforceConsumerDeletion:
          type: boolean
          description: >-
            If true, deletes the stream even if consumers are registered.
    DescribeStreamInput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        Limit:
          type: integer
          minimum: 1
          maximum: 10000
          description: The maximum number of shards to return.
        ExclusiveStartShardId:
          $ref: '#/components/schemas/ShardId'
    DescribeStreamOutput:
      type: object
      required:
        - StreamDescription
      properties:
        StreamDescription:
          $ref: '#/components/schemas/StreamDescription'
    DescribeStreamSummaryInput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
    DescribeStreamSummaryOutput:
      type: object
      required:
        - StreamDescriptionSummary
      properties:
        StreamDescriptionSummary:
          $ref: '#/components/schemas/StreamDescriptionSummary'
    ListStreamsInput:
      type: object
      properties:
        Limit:
          type: integer
          minimum: 1
          maximum: 10000
          description: The maximum number of streams to list.
        ExclusiveStartStreamName:
          $ref: '#/components/schemas/StreamName'
        NextToken:
          type: string
          description: Pagination token.
    ListStreamsOutput:
      type: object
      required:
        - StreamNames
        - HasMoreStreams
      properties:
        StreamNames:
          type: array
          items:
            $ref: '#/components/schemas/StreamName'
          description: The names of the streams.
        HasMoreStreams:
          type: boolean
          description: If true, there are more streams available to list.
        NextToken:
          type: string
          description: Pagination token for the next call.
        StreamSummaries:
          type: array
          items:
            type: object
            properties:
              StreamName:
                $ref: '#/components/schemas/StreamName'
              StreamARN:
                $ref: '#/components/schemas/StreamARN'
              StreamStatus:
                $ref: '#/components/schemas/StreamStatus'
              StreamModeDetails:
                $ref: '#/components/schemas/StreamModeDetails'
              StreamCreationTimestamp:
                type: number
                format: double
          description: Summary information about the streams.
    UpdateStreamModeInput:
      type: object
      required:
        - StreamARN
        - StreamModeDetails
      properties:
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        StreamModeDetails:
          $ref: '#/components/schemas/StreamModeDetails'
    ListShardsInput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        NextToken:
          type: string
        ExclusiveStartShardId:
          $ref: '#/components/schemas/ShardId'
        MaxResults:
          type: integer
          minimum: 1
          maximum: 10000
        StreamCreationTimestamp:
          type: number
          format: double
        ShardFilter:
          type: object
          properties:
            Type:
              type: string
              enum:
                - AFTER_SHARD_ID
                - AT_TRIM_HORIZON
                - FROM_TRIM_HORIZON
                - AT_LATEST
                - AT_TIMESTAMP
                - FROM_TIMESTAMP
            ShardId:
              $ref: '#/components/schemas/ShardId'
            Timestamp:
              type: number
              format: double
    ListShardsOutput:
      type: object
      properties:
        Shards:
          type: array
          items:
            $ref: '#/components/schemas/Shard'
          description: An array of JSON objects representing shards.
        NextToken:
          type: string
          description: Pagination token for the next call.
    SplitShardInput:
      type: object
      required:
        - ShardToSplit
        - NewStartingHashKey
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ShardToSplit:
          $ref: '#/components/schemas/ShardId'
        NewStartingHashKey:
          type: string
          description: >-
            A hash key value for the starting hash key of one of the child
            shards created by the split.
    MergeShardsInput:
      type: object
      required:
        - ShardToMerge
        - AdjacentShardToMerge
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ShardToMerge:
          $ref: '#/components/schemas/ShardId'
        AdjacentShardToMerge:
          $ref: '#/components/schemas/ShardId'
    UpdateShardCountInput:
      type: object
      required:
        - TargetShardCount
        - ScalingType
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        TargetShardCount:
          type: integer
          minimum: 1
          description: The new number of shards.
        ScalingType:
          $ref: '#/components/schemas/ScalingType'
    UpdateShardCountOutput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        CurrentShardCount:
          type: integer
          description: The current number of shards.
        TargetShardCount:
          type: integer
          description: The updated number of shards.
    PutRecordInput:
      type: object
      required:
        - Data
        - PartitionKey
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        Data:
          type: string
          format: byte
          minLength: 0
          maxLength: 1048576
          description: The data blob to put into the record. Base64-encoded.
        PartitionKey:
          $ref: '#/components/schemas/PartitionKey'
        ExplicitHashKey:
          type: string
          pattern: '0|([1-9]\d{0,38})'
          description: The hash value used to explicitly determine the shard.
        SequenceNumberForOrdering:
          $ref: '#/components/schemas/SequenceNumber'
    PutRecordOutput:
      type: object
      required:
        - ShardId
        - SequenceNumber
      properties:
        ShardId:
          $ref: '#/components/schemas/ShardId'
        SequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
    PutRecordsInput:
      type: object
      required:
        - Records
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        Records:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/PutRecordRequestEntry'
          description: The records to write to the stream.
    PutRecordsOutput:
      type: object
      required:
        - Records
      properties:
        FailedRecordCount:
          type: integer
          minimum: 0
          description: The number of records that failed.
        Records:
          type: array
          items:
            $ref: '#/components/schemas/PutRecordsResultEntry'
          description: Result for each record in the request.
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
    GetShardIteratorInput:
      type: object
      required:
        - ShardId
        - ShardIteratorType
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ShardId:
          $ref: '#/components/schemas/ShardId'
        ShardIteratorType:
          $ref: '#/components/schemas/ShardIteratorType'
        StartingSequenceNumber:
          $ref: '#/components/schemas/SequenceNumber'
        Timestamp:
          type: number
          format: double
          description: >-
            The timestamp of the data record from which to start reading. Used
            with shard iterator type AT_TIMESTAMP.
    GetShardIteratorOutput:
      type: object
      properties:
        ShardIterator:
          type: string
          minLength: 1
          maxLength: 512
          description: >-
            The position in the shard from which to start reading data records
            sequentially. Expires after 5 minutes.
    GetRecordsInput:
      type: object
      required:
        - ShardIterator
      properties:
        ShardIterator:
          type: string
          minLength: 1
          maxLength: 512
          description: >-
            The position in the shard from which to start reading data records.
        Limit:
          type: integer
          minimum: 1
          maximum: 10000
          description: >-
            The maximum number of records to return. Default is 10,000.
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
    GetRecordsOutput:
      type: object
      required:
        - Records
      properties:
        Records:
          type: array
          items:
            $ref: '#/components/schemas/Record'
          description: The data records retrieved from the shard.
        NextShardIterator:
          type: string
          minLength: 1
          maxLength: 512
          description: >-
            The next position in the shard to start reading. Null if the shard
            has been closed.
        MillisBehindLatest:
          type: integer
          minimum: 0
          description: >-
            The number of milliseconds the GetRecords response is from the tip
            of the stream. 0 indicates the consumer is caught up.
        ChildShards:
          type: array
          items:
            $ref: '#/components/schemas/ChildShard'
          description: >-
            The list of the current shard's child shards, returned when the end
            of the current shard is reached.
    RegisterStreamConsumerInput:
      type: object
      required:
        - StreamARN
        - ConsumerName
      properties:
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ConsumerName:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '[a-zA-Z0-9_.-]+'
          description: >-
            For a given Kinesis data stream, each consumer must have a unique
            name. However, consumer names do not have to be unique across data
            streams.
    RegisterStreamConsumerOutput:
      type: object
      required:
        - Consumer
      properties:
        Consumer:
          $ref: '#/components/schemas/Consumer'
    DeregisterStreamConsumerInput:
      type: object
      properties:
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ConsumerName:
          type: string
          minLength: 1
          maxLength: 128
        ConsumerARN:
          $ref: '#/components/schemas/ConsumerARN'
    DescribeStreamConsumerInput:
      type: object
      properties:
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ConsumerName:
          type: string
          minLength: 1
          maxLength: 128
        ConsumerARN:
          $ref: '#/components/schemas/ConsumerARN'
    DescribeStreamConsumerOutput:
      type: object
      required:
        - ConsumerDescription
      properties:
        ConsumerDescription:
          $ref: '#/components/schemas/ConsumerDescription'
    ListStreamConsumersInput:
      type: object
      required:
        - StreamARN
      properties:
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        NextToken:
          type: string
        MaxResults:
          type: integer
          minimum: 1
          maximum: 10000
        StreamCreationTimestamp:
          type: number
          format: double
    ListStreamConsumersOutput:
      type: object
      properties:
        Consumers:
          type: array
          items:
            $ref: '#/components/schemas/Consumer'
          description: The consumers registered to the data stream.
        NextToken:
          type: string
          description: Pagination token for the next call.
    SubscribeToShardInput:
      type: object
      required:
        - ConsumerARN
        - ShardId
        - StartingPosition
      properties:
        ConsumerARN:
          $ref: '#/components/schemas/ConsumerARN'
        ShardId:
          $ref: '#/components/schemas/ShardId'
        StartingPosition:
          $ref: '#/components/schemas/StartingPosition'
    SubscribeToShardOutput:
      type: object
      required:
        - EventStream
      properties:
        EventStream:
          type: object
          description: The event stream that the consumer receives from the shard.
          properties:
            SubscribeToShardEvent:
              $ref: '#/components/schemas/SubscribeToShardEvent'
    EnableEnhancedMonitoringInput:
      type: object
      required:
        - ShardLevelMetrics
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ShardLevelMetrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricsName'
    DisableEnhancedMonitoringInput:
      type: object
      required:
        - ShardLevelMetrics
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ShardLevelMetrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricsName'
    EnhancedMonitoringOutput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        CurrentShardLevelMetrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricsName'
        DesiredShardLevelMetrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricsName'
    StartStreamEncryptionInput:
      type: object
      required:
        - EncryptionType
        - KeyId
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
        KeyId:
          type: string
          minLength: 1
          maxLength: 2048
          description: >-
            The GUID for the customer-managed AWS KMS key to use for
            encryption. You can specify the key ID, key ARN, alias name, or
            alias ARN.
    StopStreamEncryptionInput:
      type: object
      required:
        - EncryptionType
        - KeyId
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        EncryptionType:
          $ref: '#/components/schemas/EncryptionType'
        KeyId:
          type: string
          minLength: 1
          maxLength: 2048
    IncreaseStreamRetentionPeriodInput:
      type: object
      required:
        - RetentionPeriodHours
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        RetentionPeriodHours:
          type: integer
          minimum: 24
          maximum: 8760
          description: The new retention period of the stream, in hours. Max 8760 (365 days).
    DecreaseStreamRetentionPeriodInput:
      type: object
      required:
        - RetentionPeriodHours
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        RetentionPeriodHours:
          type: integer
          minimum: 24
          maximum: 8760
          description: The new retention period of the stream, in hours. Min 24.
    AddTagsToStreamInput:
      type: object
      required:
        - Tags
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        Tags:
          type: object
          additionalProperties:
            type: string
            maxLength: 256
          description: A set of up to 50 key-value pairs.
    ListTagsForStreamInput:
      type: object
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        ExclusiveStartTagKey:
          type: string
          minLength: 1
          maxLength: 128
        Limit:
          type: integer
          minimum: 1
          maximum: 50
    ListTagsForStreamOutput:
      type: object
      required:
        - Tags
        - HasMoreTags
      properties:
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          description: A list of tags associated with the stream.
        HasMoreTags:
          type: boolean
          description: If true, more tags are available.
    RemoveTagsFromStreamInput:
      type: object
      required:
        - TagKeys
      properties:
        StreamName:
          $ref: '#/components/schemas/StreamName'
        StreamARN:
          $ref: '#/components/schemas/StreamARN'
        TagKeys:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 128
          description: A list of tag keys to remove.
    PutResourcePolicyInput:
      type: object
      required:
        - ResourceARN
        - Policy
      properties:
        ResourceARN:
          type: string
          minLength: 1
          maxLength: 2048
          description: The Amazon Resource Name (ARN) of the data stream or consumer.
        Policy:
          type: string
          description: >-
            Details of the resource policy as a JSON string. The resource policy
            must include both the identity policy and the resource policy.
    GetResourcePolicyInput:
      type: object
      required:
        - ResourceARN
      properties:
        ResourceARN:
          type: string
          minLength: 1
          maxLength: 2048
          description: The ARN of the data stream or consumer.
    GetResourcePolicyOutput:
      type: object
      required:
        - Policy
      properties:
        Policy:
          type: string
          description: Details of the resource policy as a JSON string.
    DeleteResourcePolicyInput:
      type: object
      required:
        - ResourceARN
      properties:
        ResourceARN:
          type: string
          minLength: 1
          maxLength: 2048
          description: The ARN of the data stream or consumer.
    DescribeLimitsOutput:
      type: object
      required:
        - ShardLimit
        - OpenShardCount
        - OnDemandStreamCount
        - OnDemandStreamCountLimit
      properties:
        ShardLimit:
          type: integer
          minimum: 0
          description: The maximum number of shards.
        OpenShardCount:
          type: integer
          minimum: 0
          description: The number of open shards.
        OnDemandStreamCount:
          type: integer
          minimum: 0
          description: The number of on-demand streams.
        OnDemandStreamCountLimit:
          type: integer
          minimum: 0
          description: The maximum number of on-demand streams.
    ErrorResponse:
      type: object
      properties:
        __type:
          type: string
          description: The error type identifier.
        message:
          type: string
          description: A human-readable description of the error.
