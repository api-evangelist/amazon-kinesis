vocabulary: 1.0.0
info:
  provider: Amazon Kinesis
  description: Unified vocabulary for Amazon Kinesis API operations and capability workflows.
  created: '2026-04-19'
  modified: '2026-04-19'
operational:
  apis:
  - namespace: kinesis
    version: '2024-01-01'
    status: active
  resources:
  - name: streams
    api: kinesis
    actions:
    - create stream
    - list streams
    - describe stream summary
    - delete stream
    - put record
    - put records
    - get records
  actions:
  - name: create
    http_method: POST
    pattern: write
  - name: list
    http_method: GET
    pattern: read
  - name: describe
    http_method: GET
    pattern: read
  - name: update
    http_method: PUT
    pattern: write
  - name: delete
    http_method: DELETE
    pattern: destructive
  authentication:
    schemes:
    - type: apikey
      header: Authorization
      description: AWS Signature Version 4
capability:
  workflows:
  - name: Amazon Kinesis Workflow
    file: capabilities/amazon-kinesis-workflow.yaml
    description: Unified workflow for Amazon Kinesis resource management
    apis_combined:
    - kinesis
    tool_count: 3
    personas:
    - Developer
    - Administrator
  personas:
  - id: developer
    name: Developer
    description: Integrates API into applications
  - id: administrator
    name: Administrator
    description: Manages resources and configurations
crossReference:
- resource: streams
  operations:
  - CreateStream
  - ListStreams
  - DescribeStreamSummary
  - DeleteStream
  - PutRecord
  - PutRecords
  - GetRecords
  workflows:
  - Amazon Kinesis Workflow
  personas:
  - Developer
  - Administrator
