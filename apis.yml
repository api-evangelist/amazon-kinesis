- name: Amazon Kinesis Data Firehose
  description: Amazon Kinesis Data Firehose is the easiest way to reliably load streaming data into data lakes, data stores, and analytics services. It can capture, transform, and deliver streaming data to destinations like Amazon S3, Amazon Redshift, Amazon OpenSearch Service, and more.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
